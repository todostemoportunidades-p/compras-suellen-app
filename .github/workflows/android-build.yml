name: Build Android (Lista de Mercado)

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Install dependencies
        run: npm ci

      - name: Build Web
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Android APK
        working-directory: ./android
        run: ./gradlew assembleDebug

      - name: Upload APK to Google Drive
        uses: adityak74/google-drive-upload-git-action@main
        with:
          credentials: ${{ secrets.GDRIVE_CREDENTIALS }}
          filename: android/app/build/outputs/apk/debug/app-debug.apk
          folderId: ${{ secrets.GDRIVE_FOLDER_ID }}
          name: ListaDeMercado-${{ github.sha }}-debug.apk
          overwrite: "true"

      - name: Send APK via Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Build Android APK - Lista de Mercado"
          to: todostemoportunidades@gmail.com
          from: Compras Suellen App
          body: "O APK (Android) foi gerado e enviado para o seu Google Drive. Segue anexo também."
          attachments: android/app/build/outputs/apk/debug/app-debug.apk
