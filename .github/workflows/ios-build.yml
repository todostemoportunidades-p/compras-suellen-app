name: Build iOS (Compras Suellen)

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Web
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Build iOS App
        run: |
          cd ios/App
          xcodebuild -project App.xcodeproj -scheme App -sdk iphoneos -configuration Debug -allowProvisioningUpdates build
        # Nota: Debug build sem assinatura para teste em simulador ou AltStore
        
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ComprasSuellen-iOS
          path: ios/App/build/Release-iphoneos/*.app
