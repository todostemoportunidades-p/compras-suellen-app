name: Build iOS (Compras Suellen)

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Web
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Build iOS App
        run: |
          cd ios/App
          xcodebuild -project App.xcodeproj -scheme App -sdk iphoneos -configuration Debug \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO \
            build
        # Nota: Build sem assinatura (precisa de AltStore/Sideloadly para instalar)
        
      - name: Package IPA
        run: |
          mkdir -p Payload
          # Encontrar o .app gerado no diretorio de build padrão do xcodebuild
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "*.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            # Se não achar no DerivedData, tenta no diretorio local (fallback)
            APP_PATH=$(find . -name "*.app" | head -n 1)
          fi
          echo "Packing $APP_PATH"
          cp -r "$APP_PATH" Payload/
          zip -r ComprasSuellen.ipa Payload
          
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ComprasSuellen-iOS-IPA
          path: ComprasSuellen.ipa
